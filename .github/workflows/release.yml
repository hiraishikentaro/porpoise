name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create draft release"
        required: false
        default: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# tauri-action が GitHub Release を作成/更新するので contents: write が必須
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (arm64)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x64)

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      # Apple signing: secret が本当に設定されている時だけ env を流す。
      # 空文字を渡すと tauri-action が import を試みて失敗するため。
      # cert 未設定時は ad-hoc 署名 (APPLE_SIGNING_IDENTITY=-) で unsigned .app を作る。
      - name: Configure Apple signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$CERT" ]; then
              {
              echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
              echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
              echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple signing cert — falling back to ad-hoc signing"
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      - name: Tauri build (${{ matrix.label }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-{0}',
            github.sha) }}
          releaseName: "Porpoise ${{ github.ref_type == 'tag' && github.ref_name ||
            github.sha }}"
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft ||
            'true' }}
          prerelease: false
          args: --target ${{ matrix.target }}

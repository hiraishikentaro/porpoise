services:
  mysql:
    image: mysql:8.4
    container_name: porpoise-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: porpoise_dev
      MYSQL_USER: porpoise
      MYSQL_PASSWORD: porpoise
    ports:
      - "3307:3306"
    volumes:
      - porpoise-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uporpoise", "-pporpoise"]
      interval: 5s
      timeout: 3s
      retries: 20

  ssh:
    # Phase 1 SSH トンネル検証用。MySQL と同じ docker network にいるので
    # アプリ側からは target_host="mysql" / port=3306 で接続する。
    image: linuxserver/openssh-server:latest
    container_name: porpoise-ssh
    environment:
      PASSWORD_ACCESS: "true"
      USER_NAME: porpoise
      USER_PASSWORD: porpoise
      SUDO_ACCESS: "false"
      PUID: "1000"
      PGID: "1000"
    ports:
      - "2222:2222"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  porpoise-mysql-data:
